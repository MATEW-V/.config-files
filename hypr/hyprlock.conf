general {
    grace = 1
    fractional_scaling = 2
    immediate_render = true
}

background {
    path = ~/wallpapers/wp0.png
    color = rgb(0,0,0)
    blur_size = 3
    blur_passes = 2
    noise = 0.0117
    contrast = 1.3000
    brightness = 0.6000
    vibrancy = 0.2100
    vibrancy_darkness = 0.0
}

# Hours
label {
    text = cmd[update:1000] echo "<b><big> $(date +"%H") </big></b>"
    color = rgba(255, 255, 255, 0.9)
    font_size = 112
    font_family = Ndot57Mono
    position = 0, 220
    halign = center
    valign = center
}

# Minutes
label {
    text = cmd[update:1000] echo "<b><big> $(date +"%M") </big></b>"
    color = rgba(255, 255, 255, 0.9)
    font_size = 112
    font_family = Ndot57Mono
    position = 0, 80
    halign = center
    valign = center
}

# Today
label {
    text = cmd[update:18000000] echo "<b><big> "$(date +'%A')" </big></b>"
    color = rgba(255, 255, 255, 0.6)
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 0, -15
    halign = center
    valign = center
}

# Week
label {
    text = cmd[update:18000000] echo "<b> "$(date +'%d %b')" </b>"
    color = rgba(255, 255, 255, 0.5)
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 0, -40
    halign = center
    valign = center
}

input-field {
    size = 250, 50
    outline_thickness = 3
    dots_size = 0.26
    dots_spacing = 0.64
    dots_center = true
    dots_rouding = -1
    rounding = 22
    outer_color = rgba(255, 255, 255, 0.2)
    inner_color = rgba(0, 0, 0, 0.6)
    font_color = rgba(255, 255, 255, 0.9)
    font_family = JetBrainsMono Nerd Font
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    position = 0, 120
    halign = center
    valign = bottom
}